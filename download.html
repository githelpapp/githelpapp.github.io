<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download GitHelp</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #0a0a0a;
      --white: #ffffff;
      --blue: #1a6bff;
      --green: #22c55e;
      --gray: #f4f4f4;
      --text-muted: #888;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--black);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    /* Background subtle grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: 
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .logo {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 48px;
      font-family: 'DM Mono', monospace;
    }

    .logo span {
      color: var(--blue);
    }

    h1 {
      font-size: clamp(36px, 8vw, 52px);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: -0.03em;
      margin-bottom: 16px;
    }

    h1 em {
      font-style: normal;
      color: var(--green);
    }

    .subtitle {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 48px;
      line-height: 1.5;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 48px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 18px 28px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.15s ease, opacity 0.15s ease;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-apple {
      background: var(--white);
      color: var(--black);
    }

    .btn-apple:hover {
      opacity: 0.92;
    }

    .btn-google {
      background: rgba(255,255,255,0.06);
      color: var(--white);
    }

    .btn-google:hover {
      background: rgba(255,255,255,0.1);
    }

    .btn-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }

    .btn-text {
      text-align: left;
    }

    .btn-label {
      font-size: 11px;
      font-weight: 500;
      opacity: 0.6;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      display: block;
      margin-bottom: 2px;
    }

    .btn-name {
      font-size: 17px;
      font-weight: 700;
      display: block;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-muted);
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin: 4px 0;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.08);
    }

    .trust {
      display: flex;
      justify-content: center;
      gap: 28px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
    }

    .trust-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .trust-item span {
      font-size: 14px;
    }

    /* Auto-redirect indicator */
    .redirect-banner {
      display: none;
      background: rgba(26, 107, 255, 0.12);
      border: 1px solid rgba(26, 107, 255, 0.25);
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 13px;
      color: #7aadff;
      margin-bottom: 24px;
      font-family: 'DM Mono', monospace;
    }

    .redirect-banner.visible {
      display: block;
    }

    @media (max-width: 380px) {
      .trust { gap: 16px; }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="logo">git<span>help</span></div>

  <h1>Get the<br><em>free app.</em></h1>
  <p class="subtitle">Home services, done fast.<br>Hire local. Work local.</p>

  <div id="redirectBanner" class="redirect-banner">
    📱 Detected your device — tap below to download
  </div>

  <div class="buttons">
    <a href="https://apps.apple.com/us/app/githelp/id6761078971" class="btn btn-apple" id="appleBtn">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      <div class="btn-text">
        <span class="btn-label">Download on the</span>
        <span class="btn-name">App Store</span>
      </div>
    </a>

    <div class="divider">or</div>

    <a href="https://play.google.com/store/apps/details?id=com.githelp.app" class="btn btn-google" id="googleBtn">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none">
        <path d="M3.18 23.76c.3.16.64.2.97.12l11.64-11.64L12 8.45 3.18 23.76z" fill="#EA4335"/>
        <path d="M22.26 10.07l-2.93-1.67-3.37 3.37 3.37 3.37 2.96-1.69c.84-.48.84-1.51-.03-1.98z" fill="#FBBC05"/>
        <path d="M3.18.24C2.83.08 2.43.1 2.1.32L14.06 12.24l3.37-3.37L3.18.24z" fill="#4285F4"/>
        <path d="M2.1 23.68c.33.22.73.24 1.08.08l14.25-8.15-3.37-3.37L2.1 23.68z" fill="#34A853"/>
      </svg>
      <div class="btn-text">
        <span class="btn-label">Get it on</span>
        <span class="btn-name">Google Play</span>
      </div>
    </a>
  </div>

  <div class="trust">
    <div class="trust-item"><span>⭐</span> Trusted</div>
    <div class="trust-item"><span>🛡</span> Secure</div>
    <div class="trust-item"><span>📍</span> Local</div>
  </div>

</div>

<script>
  // Detect device and highlight the right button
  const ua = navigator.userAgent || navigator.vendor || window.opera;
  const isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  const isAndroid = /android/i.test(ua);
  const banner = document.getElementById('redirectBanner');

  if (isIOS) {
    banner.classList.add('visible');
    // Subtle visual cue — dim the Google button
    document.getElementById('googleBtn').style.opacity = '0.4';
  } else if (isAndroid) {
    banner.classList.add('visible');
    document.getElementById('appleBtn').style.opacity = '0.4';
  }
</script>

</body>
</html>
